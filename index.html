<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TamaCakes • Sistema de Producción</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-container">

<div class="login-card">

<div class="logo-circle">🧁</div>

<h1 class="brand-title">TamaCakes</h1>

<p class="subtitle">Sistema de Producción Pastelera</p>

<div class="login-form">

<input type="email" id="loginEmail" placeholder="Correo electrónico">

<input type="password" id="loginPass" placeholder="Contraseña">

<button class="btn btn-primary btn-full" onclick="login()">
Entrar al sistema
</button>

<p id="loginMsg" class="login-error"></p>

</div>
</div>
</div>


<!-- APP -->

<div id="app" style="display:none;">

<header class="main-header">

<div class="header-content">

<div class="brand">

<div class="logo-mini">🧁</div>

<div>
<h1>TamaCakes Admin</h1>
<span id="syncMsg" class="sync-status">Sincronizado ✓</span>
</div>

</div>

<div class="user-info">

<span id="userName"></span>

<button class="btn btn-outline btn-sm" onclick="logout()">
Cerrar sesión
</button>

</div>

</div>

</header>


<main class="container">

<div id="alertasGlobales"></div>

<!-- TABS -->

<div class="tabs">

<button class="tab-btn active" onclick="switchTab('inv',this)">🌾 Materia Prima</button>

<button class="tab-btn" onclick="switchTab('rct',this)">📜 Recetas</button>

<button class="tab-btn" onclick="switchTab('pro',this)">🍰 Productos</button>

<button class="tab-btn" onclick="switchTab('tar',this)">👨‍🍳 Producción</button>

<button class="tab-btn" onclick="switchTab('ord',this)">🛍 Pedidos</button>

</div>


<div class="tab-content">

<!-- INVENTARIO -->

<div id="tab-inv" class="tab-pane active">

<div class="card">

<h2 class="card-title">➕ Nueva Materia Prima</h2>

<div class="form-grid">

<div class="fg">
<label>Nombre</label>
<input id="invNombre">
</div>

<div class="fg">
<label>Categoría</label>
<input id="invCategoria">
</div>

<div class="fg">
<label>Unidad</label>

<select id="invUnidad">

<option value="g">Gramos</option>
<option value="kg">Kg</option>
<option value="ml">ml</option>
<option value="L">Litros</option>
<option value="unidades">Unidades</option>

</select>

</div>

<div class="fg">
<label>Stock</label>
<input type="number" id="invCantidad">
</div>

<div class="fg">
<label>Costo $</label>
<input type="number" id="invCosto">
</div>

</div>

<button class="btn btn-primary" onclick="addMateriaPrima()">
Guardar
</button>

</div>


<div class="card">

<h2 class="card-title">📦 Inventario</h2>

<div class="table-container">

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Categoría</th>
<th>Stock</th>
<th>Costo</th>
<th></th>
</tr>

</thead>

<tbody id="tbodyInv"></tbody>

</table>

</div>
</div>
</div>


</div>
</main>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="app.js"></script>

</body>
</html>
