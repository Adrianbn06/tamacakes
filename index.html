<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TamaCakes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <h2>TamaCakes</h2>
      </div>
      <p style="color: #666; font-size: 0.9rem;">Sistema protegido</p>
      
      <div class="login-form">
        <input type="email" id="loginEmail" placeholder="Correo electrónico">
        <input type="password" id="loginPass" placeholder="Contraseña">
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="iniciarSesion()">Ingresar al sistema</button>
        <p id="loginMsg" style="margin-top: 10px; font-size: 0.9rem;"></p>
      </div>
    </div>
  </div>

  <div id="app" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: white; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
      <div>
        <h1 style="margin: 0; font-size: 1.2rem; color: var(--brown);">TamaCakes</h1>
        <span id="syncMsg" style="font-size: 0.8rem; color: #666;"></span>
      </div>
      <div>
        <span id="userName" style="margin-right: 10px; font-weight: bold;"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="container" style="padding: 0 1rem;">
      <div class="tabs" style="display: flex; gap: 10px; margin-bottom: 1rem; overflow-x: auto;">
        <button class="tab-btn active" onclick="switchTab('inv', this)" style="padding: 8px 16px; cursor: pointer; border: 1px solid var(--border); background: white;">📦 Materia Prima</button>
        <button class="tab-btn" onclick="switchTab('ord', this)" style="padding: 8px 16px; cursor: pointer; border: 1px solid var(--border); background: white;">🎂 Pedidos</button>
        <button class="tab-btn" onclick="switchTab('tar', this)" style="padding: 8px 16px; cursor: pointer; border: 1px solid var(--border); background: white;">📝 To-Do List</button>
      </div>

      <div class="tab-content">
        
        <div id="tab-inv" class="tab-pane active" style="display: block;">
          <div id="rolBannerInv"></div>
          <div class="card" id="formCardInv" style="background: white; padding: 1rem; border: 1px solid var(--border); margin-bottom: 1rem;">
            <h2 style="margin-top:0;font-size:1.1rem;color:var(--brown)">➕ Registrar Materia Prima</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
              <div><label>Nombre</label><input type="text" id="invNombre" style="width: 100%; padding: 5px;"></div>
              <div><label>Categoría</label><input type="text" id="invCategoria" style="width: 100%; padding: 5px;"></div>
              <div><label>Cantidad</label><input type="number" id="invCantidad" min="0" style="width: 100%; padding: 5px;"></div>
              <div><label>Costo ($)</label><input type="number" id="invCosto" min="0" step="0.01" style="width: 100%; padding: 5px;"></div>
              <div><label>Precio Venta ($)</label><input type="number" id="invPrecio" min="0" step="0.01" style="width: 100%; padding: 5px;"></div>
            </div>
            <button class="btn btn-primary" style="margin-top:1rem; padding: 8px 16px;" onclick="addProducto()">Guardar Producto</button>
          </div>

          <div class="card" style="background: white; padding: 1rem; border: 1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
              <h2 style="margin:0;font-size:1.1rem;color:var(--brown)">📋 Base de Materia Prima</h2>
              <input type="text" id="filtroInv" placeholder="Buscar..." style="padding:5px;" onkeyup="renderTablaInv()">
            </div>
            <div style="overflow-x: auto;">
              <table style="width: 100%; text-align: left; border-collapse: collapse;">
                <thead><tr style="border-bottom: 1px solid #ccc;"><th>Nombre</th><th>Cat.</th><th>Stock</th><th>Costo</th><th>Precio</th><th>Total</th><th id="thDel">Acción</th></tr></thead>
                <tbody id="tbodyInv"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="tab-ord" class="tab-pane" style="display: none;">
          <div class="card" style="background: white; padding: 1rem; border: 1px solid var(--border); margin-bottom: 1rem;">
            <h2 style="margin-top:0;font-size:1.1rem;color:var(--brown)">➕ Agendar Nuevo Pedido</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1rem;">
              <div><label>Cliente</label><input type="text" id="ordCliente" style="width: 100%; padding: 5px;"></div>
              <div><label>F. Pedido</label><input type="date" id="ordFechaPed" style="width: 100%; padding: 5px;"></div>
              <div><label>F. Entrega</label><input type="date" id="ordFechaEnt" style="width: 100%; padding: 5px;"></div>
              <div><label>Método</label><select id="ordMetodo" style="width: 100%; padding: 5px;"><option>Efectivo</option><option>Transferencia (TAMARA)</option><option>Transferencia (ALISON)</option></select></div>
              <div><label>Estado Pago</label><select id="ordEstadoPago" onchange="toggleAdelanto()" style="width: 100%; padding: 5px;"><option>Por pagar</option><option value="Adelanto">Adelanto</option><option>Pagado</option></select></div>
              <div id="divAdelanto" style="display:none;"><label>Adelanto ($)</label><input type="number" id="ordAdelanto" style="width: 100%; padding: 5px;"></div>
            </div>
            <div id="ordenItems"></div>
            <div style="margin-top:1rem;">
              <button onclick="addItemRow()" style="padding: 8px; margin-right: 10px;">+ Añadir producto</button>
              <button class="btn btn-primary" onclick="agendarPedido()" style="padding: 8px 16px;">Guardar Pedido</button>
            </div>
          </div>

          <div class="card" style="background: white; padding: 1rem; border: 1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
              <h2 style="margin:0;font-size:1.1rem;color:var(--brown)">🎂 Lista de Pedidos</h2>
              <input type="text" id="filtroOrd" placeholder="Buscar..." style="padding:5px;" onkeyup="renderTablaOrd()">
            </div>
            <div style="overflow-x: auto;">
              <table style="width: 100%; text-align: left; border-collapse: collapse;">
                <thead><tr style="border-bottom: 1px solid #ccc;"><th>Cliente</th><th>Fechas</th><th>Productos</th><th>Finanzas</th><th>Pago</th><th>Estado</th></tr></thead>
                <tbody id="tbodyOrd"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="tab-tar" class="tab-pane" style="display: none;">
          <div class="card" style="background: white; padding: 1rem; border: 1px solid var(--border); margin-bottom: 1rem;">
            <h2 style="margin-top:0;font-size:1.1rem;color:var(--brown)">➕ Nueva Tarea</h2>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
              <div style="flex: 2;"><label>Descripción</label><input type="text" id="tarDesc" placeholder="¿Qué hay que hacer?" style="width: 100%; padding: 5px;"></div>
              <div style="flex: 1;"><label>Fecha Límite</label><input type="date" id="tarFecha" style="width: 100%; padding: 5px;"></div>
              <button class="btn btn-primary" onclick="addTarea()" style="padding: 8px 16px;">Agregar</button>
            </div>
          </div>

          <div class="card" style="background: white; padding: 1rem; border: 1px solid var(--border);">
            <h2 style="margin-top:0;font-size:1.1rem;color:var(--brown)">📝 Pendientes</h2>
            <div style="overflow-x: auto;">
              <table style="width: 100%; text-align: left; border-collapse: collapse;">
                <thead><tr style="border-bottom: 1px solid #ccc;"><th>Tarea</th><th>Límite</th><th>Estado</th><th>Acción</th></tr></thead>
                <tbody id="tbodyTar"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
