<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TamaCakes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <img src="https://img.icons8.com/fluency/96/cupcake.png" alt="Logo">
      </div>
      <h1>TamaCakes</h1>
      <p class="subtitle">Gestión de Inventario</p>
      
      <div class="login-form">
        <input type="email" id="loginEmail" placeholder="Correo">
        <input type="password" id="loginPass" placeholder="Contraseña">
        <button class="btn-login" onclick="login()">Ingresar</button>
        <p id="loginMsg" class="login-error"></p>
      </div>
    </div>
  </div>

  <div id="app" style="display: none;">
    <header>
      <div class="header-content">
        <h1>TamaCakes Admin</h1>
        <div class="user-info">
          <span id="userName"></span>
          <span id="syncMsg" style="font-size: 0.7rem; display: block; color: #888;"></span>
          <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('inv', this)">Materia Prima</button>
        <button class="tab-btn" onclick="switchTab('rct', this)">Recetas</button>
        <button class="tab-btn" onclick="switchTab('pro', this)">Productos</button>
        <button class="tab-btn" onclick="switchTab('tar', this)">Cocina</button>
        <button class="tab-btn" onclick="switchTab('ord', this)">Ventas</button>
      </div>

      <div id="alertasGlobales"></div>

      <div class="tab-content">
        <div id="tab-inv" class="tab-pane active">
          <div class="card">
            <h3>Registrar Ingrediente</h3>
            <div class="form-grid">
              <input type="text" id="invNombre" placeholder="Nombre">
              <input type="text" id="invCategoria" placeholder="Categoría">
              <select id="invUnidad">
                <option value="g">Gramos (g)</option>
                <option value="unidades">Unidades</option>
              </select>
              <input type="number" id="invCantidad" placeholder="Cantidad">
              <input type="number" id="invCosto" placeholder="Costo Unitario">
            </div>
            <button class="btn-save" onclick="addMateriaPrima()">Guardar</button>
          </div>
          <table id="tablaInv">
            <thead><tr><th>Nombre</th><th>Stock</th><th>Costo</th><th>Acción</th></tr></thead>
            <tbody id="tbodyInv"></tbody>
          </table>
        </div>

        <div id="tab-rct" class="tab-pane">
          <div class="card">
            <h3>Nueva Receta</h3>
            <input type="text" id="rctNombre" placeholder="Nombre de la receta">
            <div id="listaIngredientesReceta" class="ingredientes-container"></div>
            <button class="btn-add" onclick="addFilaIngrediente()">+ Agregar Ingrediente</button>
            <button class="btn-save" onclick="guardarReceta()">Guardar Receta</button>
          </div>
          <table id="tablaRct">
            <thead><tr><th>Receta</th><th>Ingredientes</th><th>Costo Prep.</th><th>Acción</th></tr></thead>
            <tbody id="tbodyRct"></tbody>
          </table>
        </div>

        </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
